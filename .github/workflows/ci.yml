name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Typecheck, lint, and unit tests (runs on all platforms) ────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run ci

  # ── macOS distributable build ───────────────────────────────────────────────
  dist-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package (unsigned DMG + ZIP)
        env:
          # Prevents electron-builder from hanging when no signing cert is present
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist:mac
      - name: List release artifacts
        run: ls -la release/
      - uses: actions/upload-artifact@v4
        with:
          name: FSim-mac
          path: release/*.{dmg,zip}
          if-no-files-found: error

  # ── Windows distributable build ─────────────────────────────────────────────
  dist-win:
    name: Build Windows NSIS
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package (NSIS installer)
        run: npm run dist:win
      - name: List release artifacts
        shell: bash
        run: ls -la release/
      - uses: actions/upload-artifact@v4
        with:
          name: FSim-win
          path: release/*.exe
          if-no-files-found: error
